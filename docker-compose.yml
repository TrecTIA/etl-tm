services:

  # ── A. Mode API: FastAPI server yang menerima upload Excel ──
  etl-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: etl-hcms-api
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file:
      - .env
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    networks:
      - supabase_default
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── B. Mode Script: jalankan ETL sekali lalu berhenti ──────
  etl-script:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: etl-hcms-script
    env_file:
      - .env
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    entrypoint: [ "python", "main.py" ]
    networks:
      - supabase_default
    profiles:
      - script

networks:
  supabase_default:
    external: true

